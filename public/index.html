<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<title>Family Leaderboard</title>
<style>
  :root {
    --bg: #1a1a2e; --card: #24243e; --card2: #2d2d52; --text: #eaeaf2;
    --muted: #9a9ab8; --accent: #ffd166; --green: #06d6a0; --red: #ef476f;
    --blue: #6ab6ff;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: max(12px, env(safe-area-inset-top)) 16px calc(84px + env(safe-area-inset-bottom));
  }
  h1 { font-size: 1.4rem; text-align: center; padding: 10px 0 2px; }
  .sub { text-align: center; color: var(--muted); font-size: .85rem; margin-bottom: 16px; }
  .card { background: var(--card); border-radius: 16px; padding: 16px; margin: 12px 0; }
  button {
    font: inherit; border: 0; border-radius: 12px; padding: 12px 16px;
    background: var(--card2); color: var(--text); cursor: pointer; touch-action: manipulation;
  }
  button:active { transform: scale(.97); }
  .primary { background: var(--accent); color: #1a1a2e; font-weight: 700; width: 100%; margin-top: 12px; }
  .danger { background: none; color: var(--red); border: 1px solid var(--red); width: 100%; margin-top: 8px; }
  .member-btn { display: block; width: 100%; margin: 8px 0; font-size: 1.1rem; text-align: left; padding: 16px; }
  .pin-input {
    font-size: 1.6rem; letter-spacing: .5em; text-align: center; width: 100%;
    background: var(--card2); border: 0; border-radius: 12px; padding: 12px; color: var(--text); margin-top: 12px;
  }
  .q { margin: 14px 0 6px; font-size: 1rem; }
  .q small { color: var(--muted); display: block; margin-top: 2px; }
  .yn { display: flex; gap: 10px; margin-top: 8px; }
  .yn button { flex: 1; font-size: 1.05rem; font-weight: 600; border: 2px solid transparent; }
  .yn button.yes.sel { background: var(--green); color: #08281f; }
  .yn button.no.sel { background: var(--red); color: #fff; }
  .daylabel { font-weight: 700; color: var(--accent); }
  .badge { font-size: .75rem; background: var(--card2); border-radius: 999px; padding: 3px 10px; color: var(--muted); }
  .done-badge { color: var(--green); }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  table { width: 100%; border-collapse: collapse; }
  th { color: var(--muted); font-size: .75rem; font-weight: 600; padding: 6px 4px; text-align: center; }
  th:first-child { text-align: left; }
  td { padding: 10px 4px; text-align: center; font-variant-numeric: tabular-nums; border-top: 1px solid var(--card2); }
  td:first-child { text-align: left; font-weight: 600; }
  .streak { color: var(--accent); font-size: .8rem; }
  .tabs { display: flex; gap: 8px; margin: 4px 0 8px; }
  .tabs button { flex: 1; font-size: .85rem; padding: 8px; }
  .tabs button.sel { background: var(--accent); color: #1a1a2e; font-weight: 700; }
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--card); padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--card2);
  }
  nav button { flex: 1; background: none; font-size: .8rem; color: var(--muted); }
  nav button.sel { color: var(--accent); }
  nav .ico { font-size: 1.3rem; display: block; }
  label { display: block; color: var(--muted); font-size: .85rem; margin: 14px 0 4px; }
  input[type=text], input[type=email], select {
    width: 100%; font: inherit; background: var(--card2); border: 0; border-radius: 10px;
    padding: 10px 12px; color: var(--text);
  }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .chip { padding: 6px 12px; font-size: .85rem; border-radius: 999px; }
  .chip.sel { background: var(--accent); color: #1a1a2e; font-weight: 700; }
  .calgrid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
  .calhead { text-align: center; color: var(--muted); font-size: .7rem; padding: 2px 0; }
  .cal {
    aspect-ratio: 1; border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-size: .85rem; background: var(--card2);
  }
  .cal.good { background: var(--green); color: #08281f; font-weight: 700; }
  .cal.part { background: #f4a261; color: #3a2200; font-weight: 700; }
  .cal.bad { background: var(--red); color: #fff; }
  .cal.pend { background: none; border: 1px dashed var(--muted); color: var(--muted); }
  .cal.vac { background: #4f6d9e; color: #fff; }
  .cal.dim { background: none; color: var(--card2); }
  .cal.editing { outline: 3px solid var(--accent); outline-offset: 1px; }
  .cal-ico { font-size: .6rem; line-height: 1; }
  .banner {
    background: linear-gradient(135deg, #b8860b, #ffd166); color: #1a1a2e;
    border-radius: 16px; padding: 14px 16px; margin: 12px 0; font-weight: 600;
  }
  .toast {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: #08281f; font-weight: 700; border-radius: 999px;
    padding: 10px 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 10;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--red); color: #fff; }
  .visually-hidden { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
  .muted { color: var(--muted); font-size: .85rem; }
  .linkish { background: none; color: var(--blue); padding: 4px; }
  .hidden { display: none; }
</style>
</head>
<body>
<h1>🏆 Family Leaderboard</h1>
<div class="sub" id="sub">Bedtime &amp; healthy eating, one day at a time</div>
<div id="view"></div>
<nav id="nav" class="hidden">
  <button data-tab="checkin"><span class="ico">✅</span>Check in</button>
  <button data-tab="board"><span class="ico">🏆</span>Board</button>
  <button data-tab="history"><span class="ico">📅</span>History</button>
  <button data-tab="profile"><span class="ico">⚙️</span>Profile</button>
</nav>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
// All user-entered text (names, rules, emails) must pass through esc() before
// being placed in HTML — it's family data, but kids prank and the repo is public.
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const view = $('#view');
let me = null;                       // {id, name, role, bedtime, food_rule, today, days}
let pin = localStorage.getItem('pin') || '';
let memberId = localStorage.getItem('memberId') || '';
let familyKey = localStorage.getItem('familyKey') || '';
let tab = 'checkin';
let boardPeriod = 'month';

function toast(msg, isError = false) {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => (t.className = 'toast'), 2200);
}

async function api(path, opts, pinOverride) {
  const res = await fetch(path, {
    headers: {
      'X-Family-Key': familyKey,
      'X-Member-Pin': pinOverride ?? pin,
      ...(opts && { 'Content-Type': 'application/json' }),
    },
    ...(opts && { method: 'POST', body: JSON.stringify(opts) }),
  });
  const data = await res.json();
  if (res.status === 401) {
    familyKey = '';
    localStorage.removeItem('familyKey');
    showGate();
    throw new Error(data.error);
  }
  if (!res.ok) throw new Error(data.error || 'Something went wrong');
  return data;
}

/* ---------- Family gate ---------- */
function showGate() {
  $('#nav').classList.add('hidden');
  $('#sub').textContent = 'Family members only';
  // A real <form> with autocomplete hints so password managers (Apple
  // Passwords etc.) offer to save and autofill the shared password. The
  // hidden username field gives them an account name to file it under.
  view.innerHTML = `<div class="card"><div class="muted">🔒 Enter the family password</div>
    <form id="gateForm">
      <input type="text" name="username" value="family" autocomplete="username" readonly class="visually-hidden" tabindex="-1" aria-hidden="true">
      <input class="pin-input" id="familyKey" name="password" type="password" autocomplete="current-password" style="letter-spacing:normal;font-size:1.1rem">
      <button class="primary" type="submit">Enter</button>
    </form></div>`;
  $('#familyKey').focus();
  $('#gateForm').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    familyKey = $('#familyKey').value;
    try {
      await api('/api/members');
      localStorage.setItem('familyKey', familyKey);
      showLogin();
    } catch (e) { toast(e.message, true); }
  });
}

function relLabel(dateStr, today) {
  const diff = Math.round((new Date(today) - new Date(dateStr)) / 86400000);
  return diff === 1 ? 'Yesterday' : `${diff} days ago`;
}
function fmtFull(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US',
    { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

/* ---------- Login ---------- */
async function showLogin(preselect) {
  $('#nav').classList.add('hidden');
  const members = await api('/api/members');
  if (preselect == null) {
    view.innerHTML = '<div class="card"><div class="muted">Who are you?</div>' +
      members.map((m) => `<button class="member-btn" data-id="${m.id}" data-pin="${m.has_pin}">${esc(m.name)}</button>`).join('') +
      '</div>';
    view.querySelectorAll('.member-btn').forEach((b) =>
      b.addEventListener('click', () => {
        if (b.dataset.pin === '1') showLogin(b.dataset.id);
        else login(b.dataset.id, '');
      })
    );
  } else {
    view.innerHTML = `<div class="card"><div class="muted">Enter your PIN</div>
      <input class="pin-input" id="pin" type="password" inputmode="numeric" maxlength="8" autocomplete="off">
      <button class="primary" id="go">Let's go</button>
      <button class="linkish" id="back">← Not me</button></div>`;
    $('#pin').focus();
    $('#go').addEventListener('click', () => login(preselect, $('#pin').value));
    $('#pin').addEventListener('keydown', (e) => e.key === 'Enter' && login(preselect, $('#pin').value));
    $('#back').addEventListener('click', () => showLogin());
  }
}

async function login(id, pinValue, { silent = false } = {}) {
  try {
    me = await api(`/api/me?memberId=${id}`, null, pinValue);
    memberId = id; pin = pinValue;
    localStorage.setItem('memberId', id);
    localStorage.setItem('pin', pinValue);
    histMemberId = null; histMonth = null; histEdit = null;
    resetAnswers();
    $('#nav').classList.remove('hidden');
    setTab('checkin');
    return true;
  } catch (e) {
    if (!silent) toast(e.message, true);
    return false;
  }
}

function logout() {
  localStorage.removeItem('memberId');
  localStorage.removeItem('pin');
  me = null; memberId = ''; pin = '';
  resetAnswers();
  showLogin();
}

/* ---------- Check-in ---------- */
// date -> selected answers. Per person: must be wiped when switching users,
// or one member's unsaved selections bleed into the next member's cards.
const answers = {};
function resetAnswers() {
  for (const k of Object.keys(answers)) delete answers[k];
}

function renderCheckin() {
  $('#sub').textContent = `Hi ${me.name}! 👋`;
  // Most recent day first.
  const days = [...me.days].reverse();
  const emptyState = `<div class="card" style="text-align:center">
      <div class="q">🎉 <b>Fresh start!</b></div>
      <p class="muted">Your first check-in unlocks tomorrow — you'll answer for today.
      Until then, set up your goals on the Profile tab.</p>
    </div>`;
  view.innerHTML = `<div class="row" style="margin:2px 4px 0">
      <span class="muted">Logging for <b>${esc(me.name)}</b></span>
      <button class="linkish" id="switchPerson">👤 Switch person</button>
    </div>` + (days.length === 0 ? emptyState : '') + days.map((d) => {
    const vac = !!d.entry?.vacation;
    const a = answers[d.date] ?? (d.entry && !vac
      ? { bedtime: !!d.entry.bedtime_yes, food: !!d.entry.food_yes, chores: !!d.entry.chores_yes, outside: !!d.entry.outside_yes }
      : { bedtime: null, food: null, chores: null, outside: null });
    answers[d.date] = a;
    return `<div class="card" data-date="${d.date}">
      <div class="row">
        <span><span class="daylabel">${relLabel(d.date, me.today)}</span><br>
          <span class="muted">${fmtFull(d.date)}</span></span>
        <span class="badge ${d.entry ? 'done-badge' : ''}">${vac ? '🏖️ vacation' : d.entry ? '✓ logged' : 'needs an answer'}</span>
      </div>
      ${vac ? `
      <div class="q" style="text-align:center;padding:8px 0">✈️ <b>Away day</b> — doesn't count for or against you (set by a parent)</div>
      ` : `
      <div class="q">🛏️ In bed by <b>${esc(me.bedtime)}</b>?<small>your bedtime</small></div>
      <div class="yn" data-q="bedtime">
        <button class="yes ${a.bedtime === true ? 'sel' : ''}">Yes 🎉</button>
        <button class="no ${a.bedtime === false ? 'sel' : ''}">No</button>
      </div>
      <div class="q">🥩 Stuck to <b>${esc(me.food_rule)}</b>?<small>your food goal</small></div>
      <div class="yn" data-q="food">
        <button class="yes ${a.food === true ? 'sel' : ''}">Yes 🎉</button>
        <button class="no ${a.food === false ? 'sel' : ''}">No</button>
      </div>
      <div class="q">🧹 Finished <b>${esc(me.chores_rule)}</b>?<small>your chores</small></div>
      <div class="yn" data-q="chores">
        <button class="yes ${a.chores === true ? 'sel' : ''}">Yes 🎉</button>
        <button class="no ${a.chores === false ? 'sel' : ''}">No</button>
      </div>
      <div class="q">🌳 <b>${esc(me.outside_rule.replace(/\?+$/, ''))}</b>?<small>your outside & exercise goal</small></div>
      <div class="yn" data-q="outside">
        <button class="yes ${a.outside === true ? 'sel' : ''}">Yes 🎉</button>
        <button class="no ${a.outside === false ? 'sel' : ''}">No</button>
      </div>
      <button class="primary save">Save ${relLabel(d.date, me.today).toLowerCase()}</button>
      ${d.entry ? '<div class="yn" style="margin-top:8px"><button class="clearday">Clear answers</button></div>' : ''}`}
    </div>`;
  }).join('');

  $('#switchPerson').addEventListener('click', logout);
  const send = async (date, payload, msg) => {
    try {
      await api('/api/checkin', { memberId: me.id, pin, date, ...payload });
      me = await api(`/api/me?memberId=${me.id}`);
      delete answers[date];
      toast(msg);
      renderCheckin();
    } catch (e) { toast(e.message, true); }
  };
  view.querySelectorAll('.card').forEach((card) => {
    const date = card.dataset.date;
    card.querySelectorAll('.yn[data-q]').forEach((yn) => {
      const q = yn.dataset.q;
      yn.querySelector('.yes').addEventListener('click', () => { answers[date][q] = true; renderCheckin(); });
      yn.querySelector('.no').addEventListener('click', () => { answers[date][q] = false; renderCheckin(); });
    });
    card.querySelector('.save')?.addEventListener('click', () => {
      const a = answers[date];
      if ([a.bedtime, a.food, a.chores, a.outside].includes(null)) {
        return toast('Answer all four questions first', true);
      }
      send(date, { bedtimeYes: a.bedtime, foodYes: a.food, choresYes: a.chores, outsideYes: a.outside }, 'Saved! 🎉');
    });
    card.querySelector('.clearday')?.addEventListener('click', () => send(date, { clear: true }, 'Answers cleared'));
  });
}

/* ---------- History calendar ---------- */
let histMemberId = null;
let histMonth = null;
let histEdit = null; // {date, bedtime, food, chores} while the admin editor is open

function dayClass(day, today) {
  if (day.preStart || day.date >= today) return 'dim'; // today isn't loggable yet
  if (day.vacation) return 'vac';
  const s = Object.values(day.statuses);
  if (s.every((x) => x === 'yes')) return 'good';
  if (s.includes('pending')) return 'pend';
  if (s.includes('yes')) return 'part';
  return 'bad';
}

async function renderHistory() {
  $('#sub').textContent = 'Month at a glance';
  histMemberId ??= me.id;
  histMonth ??= me.today.slice(0, 7);
  const [members, h] = await Promise.all([
    api('/api/members'),
    api(`/api/history?memberId=${histMemberId}&month=${histMonth}`),
  ]);
  const monthLabel = new Date(histMonth + '-01T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  const firstDow = new Date(histMonth + '-01T00:00:00').getDay();
  const cells = Array(firstDow).fill('<div></div>').concat(h.days.map((day) =>
    `<div class="cal ${dayClass(day, h.today)}" data-date="${day.date}">
       ${Number(day.date.slice(8))}${day.vacation ? '<span class="cal-ico">✈️</span>' : ''}
     </div>`));

  view.innerHTML = `<div class="card">
    <div class="chips">${members.map((m) =>
      `<button class="chip ${m.id === Number(histMemberId) ? 'sel' : ''}" data-id="${m.id}">${esc(m.name.split(' ')[0])}</button>`).join('')}</div>
    <div class="row" style="margin:8px 0 2px">
      <button class="linkish" id="prevMonth">←</button>
      <b>${esc(h.member.name)} — ${monthLabel}</b>
      <button class="linkish" id="nextMonth">→</button>
    </div>
    <div class="calgrid">
      ${['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d) => `<div class="calhead">${d}</div>`).join('')}
      ${cells.join('')}
    </div>
    <p class="muted" style="margin-top:10px">
      <span style="color:var(--green)">■</span> perfect ·
      <span style="color:#f4a261">■</span> partial ·
      <span style="color:var(--red)">■</span> missed ·
      <span style="color:#4f6d9e">■</span> ✈️ away ·
      dashed = still loggable</p>
    ${me.role === 'admin' ? '<p class="muted">👑 Tap any past day to correct it.</p><div id="dayEditor"></div>' : ''}
  </div>`;

  view.querySelectorAll('.chip').forEach((c) => c.addEventListener('click', () => {
    histMemberId = Number(c.dataset.id); histEdit = null; renderHistory();
  }));
  const shiftMonth = (delta) => {
    const [y, m] = histMonth.split('-').map(Number);
    const d = new Date(y, m - 1 + delta, 1);
    histMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    histEdit = null;
    renderHistory();
  };
  $('#prevMonth').addEventListener('click', () => shiftMonth(-1));
  $('#nextMonth').addEventListener('click', () => shiftMonth(1));

  if (me.role === 'admin') {
    view.querySelectorAll('.cal[data-date]').forEach((cell) => cell.addEventListener('click', () => {
      const day = h.days.find((x) => x.date === cell.dataset.date);
      if (!day) return;
      if (day.preStart) return toast(`That's before ${h.member.name} joined`, true);
      if (day.date >= h.today) return toast("That day isn't over yet", true);
      histEdit = { date: day.date, ...(day.entry ?? { bedtime: null, food: null, chores: null, outside: null }) };
      view.querySelectorAll('.cal.editing').forEach((c) => c.classList.remove('editing'));
      cell.classList.add('editing');
      renderDayEditor(h);
      $('#dayEditor').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }));
    if (histEdit && histEdit.date.startsWith(histMonth)) {
      view.querySelector(`.cal[data-date="${histEdit.date}"]`)?.classList.add('editing');
      renderDayEditor(h);
    }
  }
}

function renderDayEditor(h) {
  const ed = histEdit;
  const yn = (q, label) => `
    <div class="q">${label}</div>
    <div class="yn" data-q="${q}">
      <button class="yes ${ed[q] === true ? 'sel' : ''}">Yes</button>
      <button class="no ${ed[q] === false ? 'sel' : ''}">No</button>
    </div>`;
  $('#dayEditor').innerHTML = `
    <div style="border-top:1px solid var(--card2);margin-top:10px;padding-top:8px">
      <b>Fixing ${esc(h.member.name)} — ${fmtFull(ed.date)}</b>
      ${yn('bedtime', '🛏️ Bedtime')}${yn('food', '🥩 Food goal')}${yn('chores', '🧹 Chores')}${yn('outside', '🌳 Outside & exercise')}
      <button class="primary" id="edSave">Save correction</button>
      <div class="yn" style="margin-top:8px">
        <button id="edVacation">✈️ Away day</button>
        <button id="edClear">Clear day</button>
      </div>
    </div>`;
  const sendFix = async (payload, msg) => {
    try {
      await api('/api/admin/checkin', { adminId: me.id, pin, memberId: Number(histMemberId), date: ed.date, ...payload });
      histEdit = null;
      toast(msg);
      renderHistory();
    } catch (e) { toast(e.message, true); }
  };
  $('#dayEditor').querySelectorAll('.yn[data-q]').forEach((row) => {
    const q = row.dataset.q;
    row.querySelector('.yes').addEventListener('click', () => { ed[q] = true; renderDayEditor(h); });
    row.querySelector('.no').addEventListener('click', () => { ed[q] = false; renderDayEditor(h); });
  });
  $('#edSave').addEventListener('click', () => {
    if ([ed.bedtime, ed.food, ed.chores, ed.outside].includes(null)) {
      return toast('Answer all four questions first', true);
    }
    sendFix({ bedtimeYes: ed.bedtime, foodYes: ed.food, choresYes: ed.chores, outsideYes: ed.outside }, 'Corrected! 🎉');
  });
  $('#edVacation').addEventListener('click', () => sendFix({ vacation: true }, '✈️ Marked as an away day'));
  $('#edClear').addEventListener('click', () => sendFix({ clear: true }, 'Day cleared'));
}

/* ---------- Leaderboard ---------- */
function championBanner(board) {
  if (Number(board.today.slice(8)) > 7) return '';
  const score = (m) => m.stats.lastMonth.bedtime + m.stats.lastMonth.food + m.stats.lastMonth.chores + m.stats.lastMonth.outside;
  const ranked = [...board.members].sort(
    (a, b) => b.stats.lastMonth.perfect - a.stats.lastMonth.perfect || score(b) - score(a));
  const top = ranked[0];
  if (!top || (top.stats.lastMonth.perfect === 0 && score(top) === 0)) return '';
  const winners = ranked
    .filter((m) => m.stats.lastMonth.perfect === top.stats.lastMonth.perfect && score(m) === score(top))
    .map((m) => esc(m.name.split(' ')[0])).join(' & ');
  const [y, mo] = board.today.split('-').map(Number);
  const monthName = new Date(y, mo - 2, 1).toLocaleDateString('en-US', { month: 'long' });
  return `<div class="banner">👑 ${monthName} champion: <b>${winners}</b> —
    ${top.stats.lastMonth.perfect} perfect day${top.stats.lastMonth.perfect === 1 ? '' : 's'}! 🎉</div>`;
}

function monthShift(yyyymm, delta) {
  const [y, m] = yyyymm.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
const monthName = (yyyymm) =>
  new Date(yyyymm + '-01T00:00:00').toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

let histAwardsMonth = null; // YYYY-MM chosen in the historical awards section

function awardsList(aw) {
  const rows = aw.categories.map((c) => `
    <tr><td style="font-weight:400">${c.label}</td>
      <td style="text-align:right">${c.winners.length
        ? `<b>${c.winners.map((w) => esc(w.split(' ')[0])).join(' & ')}</b> <span class="muted">(${c.best} ${c.unit})</span>`
        : '<span class="muted">—</span>'}</td></tr>`).join('');
  const any = aw.categories.some((c) => c.winners.length);
  return any
    ? `<table>${rows}</table>`
    : `<p class="muted">No check-ins were logged in ${monthName(aw.month)}.</p>`;
}

async function renderBoard() {
  $('#sub').textContent = 'Who is winning?';
  const board = await api('/api/leaderboard');
  const lastMonth = monthShift(board.today.slice(0, 7), -1);
  histAwardsMonth ??= monthShift(board.today.slice(0, 7), -2);
  const [lastAwards, histAwards] = await Promise.all([
    api(`/api/awards?month=${lastMonth}`),
    api(`/api/awards?month=${histAwardsMonth}`),
  ]);
  // months selectable in history: from 2 months ago back one year
  const histOptions = Array.from({ length: 12 }, (_, i) => monthShift(board.today.slice(0, 7), -2 - i));
  const period = boardPeriod;
  const score = (m) => m.stats[period].bedtime + m.stats[period].food + m.stats[period].chores + m.stats[period].outside;
  const sorted = [...board.members].sort((a, b) =>
    b.stats[period].perfect - a.stats[period].perfect || score(b) - score(a));
  const medals = ['🥇', '🥈', '🥉'];
  view.innerHTML = championBanner(board) + `<div class="card">
    <div class="tabs">
      ${['month', 'year', 'allTime'].map((p) =>
        `<button data-p="${p}" class="${p === period ? 'sel' : ''}">${p === 'month' ? 'This month' : p === 'year' ? 'This year' : 'All time'}</button>`).join('')}
    </div>
    <table>
      <tr><th></th><th>🛏️</th><th>🥩</th><th>🧹</th><th>🌳</th><th>⭐</th></tr>
      ${sorted.map((m, i) => `<tr>
        <td>${medals[i] ?? ''} ${esc(m.name.split(' ')[0])}<br>
          <span class="streak">🔥 ${m.stats.streaks.perfect.current} day streak (best ${m.stats.streaks.perfect.longest})</span></td>
        <td>${m.stats[period].bedtime}</td>
        <td>${m.stats[period].food}</td>
        <td>${m.stats[period].chores}</td>
        <td>${m.stats[period].outside}</td>
        <td><b>${m.stats[period].perfect}</b></td>
      </tr>`).join('')}
    </table>
    <p class="muted" style="margin-top:10px">🛏️ bedtime · 🥩 food goal · 🧹 chores · 🌳 outside &amp; exercise · ⭐ perfect days (all four). Streaks count perfect days.</p>
  </div>
  <div class="card">
    <b>👑 ${monthName(lastMonth)} awards</b>
    <div style="margin-top:8px">${awardsList(lastAwards)}</div>
    <p class="muted" style="margin-top:8px">A new set of awards is crowned on the 1st of every month.</p>
  </div>
  <div class="card">
    <div class="row"><b>📜 Award history</b>
      <select id="histMonthSel" style="width:auto">${histOptions.map((mo) =>
        `<option value="${mo}" ${mo === histAwardsMonth ? 'selected' : ''}>${monthName(mo)}</option>`).join('')}</select>
    </div>
    <div style="margin-top:8px">${awardsList(histAwards)}</div>
  </div>`;
  view.querySelectorAll('.tabs button').forEach((b) =>
    b.addEventListener('click', () => { boardPeriod = b.dataset.p; renderBoard(); }));
  $('#histMonthSel').addEventListener('change', (e) => { histAwardsMonth = e.target.value; renderBoard(); });
}

/* ---------- Profile ---------- */
function renderProfile() {
  $('#sub').textContent = 'Your settings';
  const isKid = me.role === 'kid';
  view.innerHTML = `<div class="card">
    <div class="row"><b>${esc(me.name)}</b><span class="badge">${me.role}</span></div>
    <label>🛏️ Your bedtime</label>
    <input type="text" id="bedtime" maxlength="100" value="${esc(me.bedtime)}" ${isKid ? 'disabled' : ''}>
    ${isKid ? '<div class="muted" style="margin-top:4px">Only a parent can change your bedtime.</div>' : ''}
    <label>🥩 Food you're avoiding (your own goal)</label>
    <input type="text" id="foodRule" maxlength="500" value="${esc(me.food_rule)}">
    <label>🧹 Your chores</label>
    <input type="text" id="chores" maxlength="500" value="${esc(me.chores_rule)}" ${isKid ? 'disabled' : ''}>
    ${isKid ? '<div class="muted" style="margin-top:4px">Only a parent can change your chores.</div>' : ''}
    <label>🌳 Your outside &amp; exercise question</label>
    <input type="text" id="outside" maxlength="500" value="${esc(me.outside_rule)}" ${isKid ? 'disabled' : ''}>
    ${isKid ? '<div class="muted" style="margin-top:4px">Only a parent can change this.</div>'
            : '<div class="muted" style="margin-top:4px">Shown as your daily question, e.g. "Walk Merlin" or "Met my exercise goal".</div>'}
    <label>📧 Email for reminders (optional)</label>
    <input type="email" id="email" value="${esc(me.email ?? '')}" placeholder="you@example.com">
    <div class="muted" style="margin-top:4px">Daily nudges and the weekly leaderboard land here. Leave blank for no emails.</div>
    <label>🔔 Push reminders on this phone</label>
    <button id="pushToggle" style="width:100%">${me.push ? 'On — tap to turn off' : 'Off — tap to turn on'}</button>
    <div class="muted" id="pushHint" style="margin-top:4px">A daily nudge when you have days left to log. Your phone will ask permission first.</div>
    <button class="primary" id="saveProfile">Save settings</button>
    <button class="linkish" id="logout" style="margin-top:8px">👤 Log out (switch person)</button>
    <button class="linkish" id="lockDevice">🔒 Lock this device (forget family password)</button>
  </div>
  ${me.role === 'admin'
    ? `<div class="card"><b>👑 Admin: manage family</b><div id="adminList" class="muted" style="margin-top:8px">Loading…</div></div>
       <div class="card"><b>🔒 Change family password</b>
         <div class="muted" style="margin-top:4px">Everyone's device will ask for the new password on its next visit.</div>
         <form id="fkForm">
           <input type="text" name="username" value="family" autocomplete="username" readonly class="visually-hidden" tabindex="-1" aria-hidden="true">
           <label>New family password (6+ characters)</label>
           <input type="password" id="newFamilyKey" autocomplete="new-password">
           <button class="primary" type="submit">Change password</button>
         </form>
       </div>`
    : ''}`;

  $('#saveProfile').addEventListener('click', async () => {
    try {
      await api('/api/profile', {
        memberId: me.id, pin,
        foodRule: $('#foodRule').value,
        email: $('#email').value,
        ...(isKid ? {} : { bedtime: $('#bedtime').value, chores: $('#chores').value, outside: $('#outside').value }),
      });
      me = await api(`/api/me?memberId=${me.id}`);
      toast('Saved! 🎉');
    } catch (e) { toast(e.message, true); }
  });
  $('#logout').addEventListener('click', logout);
  $('#lockDevice').addEventListener('click', () => {
    localStorage.clear();
    me = null; memberId = ''; pin = ''; familyKey = '';
    showGate();
  });
  $('#pushToggle').addEventListener('click', () => (me.push ? disablePush() : enablePush()));
  if (me.role === 'admin') {
    $('#fkForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const newKey = $('#newFamilyKey').value;
      try {
        await api('/api/admin/familykey', { adminId: me.id, pin, newKey });
        familyKey = newKey;                    // keep this device unlocked
        localStorage.setItem('familyKey', newKey);
        $('#newFamilyKey').value = '';
        toast('Family password changed! 🔒');
      } catch (e) { toast(e.message, true); }
    });
    renderAdmin();
  }
}

const roleSelect = (cls, selected) => `<select class="${cls}">
  ${['admin', 'adult', 'kid'].map((r) => `<option value="${r}" ${r === selected ? 'selected' : ''}>${r}</option>`).join('')}
</select>`;

async function renderAdmin() {
  const members = await api('/api/members');
  $('#adminList').innerHTML = members.map((m) => `
    <div style="border-top:1px solid var(--card2);padding:10px 0" data-id="${m.id}">
      <div class="row"><b style="color:var(--text)">${esc(m.name)}</b><span class="badge">${m.role}${m.has_pin ? ' · 🔑 PIN set' : ' · no PIN'}</span></div>
      <label>Name</label><input type="text" class="a-name" maxlength="80" value="${esc(m.name)}">
      <label>Role</label>${roleSelect('a-role', m.role)}
      <label>Bedtime</label><input type="text" class="a-bedtime" maxlength="100" value="${esc(m.bedtime)}">
      <label>Food goal</label><input type="text" class="a-food" maxlength="500" value="${esc(m.food_rule)}">
      <label>Chores</label><input type="text" class="a-chores" maxlength="500" value="${esc(m.chores_rule)}">
      <label>Outside &amp; exercise question</label><input type="text" class="a-outside" maxlength="500" value="${esc(m.outside_rule)}">
      <label>Email for reminders (blank = none)</label><input type="email" class="a-email" value="${esc(m.email ?? '')}" placeholder="them@example.com">
      <label>New PIN (blank = keep current)</label><input type="text" class="a-pin" inputmode="numeric" placeholder="••••" autocomplete="off">
      <label style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <input type="checkbox" class="a-nopin" style="width:auto" ${m.has_pin ? '' : 'checked'}>
        No PIN — ${esc(m.name.split(' ')[0])} logs in with one tap
      </label>
      <button class="primary a-save" style="margin-top:8px">Update ${esc(m.name.split(' ')[0])}</button>
      <button class="danger a-remove">Remove ${esc(m.name.split(' ')[0])}…</button>
    </div>`).join('') + `
    <div style="border-top:1px solid var(--card2);padding:12px 0">
      <b style="color:var(--text)">➕ Add a member</b>
      <label>Name</label><input type="text" id="add-name" placeholder="Name">
      <label>Role</label>${roleSelect('add-role', 'kid')}
      <label>Bedtime</label><input type="text" id="add-bedtime" maxlength="100" placeholder="9:00 PM">
      <label>Food goal</label><input type="text" id="add-food" maxlength="500" placeholder="no junk food">
      <label>Chores</label><input type="text" id="add-chores" maxlength="500" placeholder="daily chores">
      <label>Outside &amp; exercise question</label><input type="text" id="add-outside" maxlength="500" placeholder="Went outside for 30+ minutes">
      <label>PIN (optional)</label><input type="text" id="add-pin" inputmode="numeric" placeholder="leave blank for no PIN">
      <button class="primary" id="a-add">Add member</button>
    </div>`;

  $('#adminList').querySelectorAll('[data-id]').forEach((row) => {
    row.querySelector('.a-save').addEventListener('click', async () => {
      try {
        await api('/api/admin/member', {
          adminId: me.id, pin, action: 'update',
          member: {
            id: Number(row.dataset.id),
            name: row.querySelector('.a-name').value,
            role: row.querySelector('.a-role').value,
            bedtime: row.querySelector('.a-bedtime').value,
            foodRule: row.querySelector('.a-food').value,
            chores: row.querySelector('.a-chores').value,
            outside: row.querySelector('.a-outside').value,
            email: row.querySelector('.a-email').value.trim() || null,
            pin: row.querySelector('.a-pin').value || undefined,
            clearPin: row.querySelector('.a-nopin').checked || undefined,
          },
        });
        toast('Updated! 🎉');
        renderAdmin();
      } catch (e) { toast(e.message, true); }
    });
    row.querySelector('.a-remove').addEventListener('click', async () => {
      const name = row.querySelector('.a-name').value;
      if (!confirm(`Remove ${name} and all their check-ins? This cannot be undone.`)) return;
      try {
        await api('/api/admin/member', {
          adminId: me.id, pin, action: 'delete',
          member: { id: Number(row.dataset.id) },
        });
        toast(`${name} removed`);
        renderAdmin();
      } catch (e) { toast(e.message, true); }
    });
  });
  $('#a-add').addEventListener('click', async () => {
    try {
      await api('/api/admin/member', {
        adminId: me.id, pin, action: 'add',
        member: {
          name: $('#add-name').value,
          role: document.querySelector('.add-role').value,
          bedtime: $('#add-bedtime').value || undefined,
          foodRule: $('#add-food').value || undefined,
          chores: $('#add-chores').value || undefined,
          outside: $('#add-outside').value || undefined,
          pin: $('#add-pin').value || undefined,
        },
      });
      toast('Added! 🎉');
      renderAdmin();
    } catch (e) { toast(e.message, true); }
  });
}

/* ---------- Push reminders (per device, opt-in) ---------- */
async function refreshMe() {
  me = await api(`/api/me?memberId=${me.id}`);
}

async function enablePush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    const ios = /iPhone|iPad/.test(navigator.userAgent) && !navigator.standalone;
    return toast(ios ? 'First add this app to your Home Screen (Share → Add to Home Screen)' : 'Push not supported in this browser', true);
  }
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    if ((await Notification.requestPermission()) !== 'granted') {
      return toast('Notifications were not allowed', true);
    }
    const { publicKey } = await api('/api/vapid');
    if (!publicKey) return toast('Push is not configured on the server yet', true);
    const keyBytes = Uint8Array.from(atob(publicKey.replace(/-/g, '+').replace(/_/g, '/')), (c) => c.charCodeAt(0));
    const sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: keyBytes });
    await api('/api/profile', { memberId: me.id, pin, pushSubscription: JSON.stringify(sub) });
    await refreshMe();
    toast('🔔 Daily reminders on');
    renderProfile();
  } catch (e) { toast(e.message, true); }
}

async function disablePush() {
  try {
    const reg = await navigator.serviceWorker?.getRegistration();
    await (await reg?.pushManager.getSubscription())?.unsubscribe();
    await api('/api/profile', { memberId: me.id, pin, pushSubscription: null });
    await refreshMe();
    toast('Push reminders off');
    renderProfile();
  } catch (e) { toast(e.message, true); }
}

/* ---------- Navigation ---------- */
function setTab(t) {
  tab = t;
  document.querySelectorAll('nav button').forEach((b) => b.classList.toggle('sel', b.dataset.tab === t));
  if (t === 'checkin') renderCheckin();
  else if (t === 'board') renderBoard();
  else if (t === 'history') renderHistory();
  else renderProfile();
}
document.querySelectorAll('nav button').forEach((b) => b.addEventListener('click', () => setTab(b.dataset.tab)));

/* ---------- Boot ---------- */
(async () => {
  if (!familyKey) { showGate(); return; }
  if (memberId && (await login(memberId, pin, { silent: true }))) return;
  // Stored identity no longer valid (e.g. a PIN was added) — forget it.
  localStorage.removeItem('memberId');
  localStorage.removeItem('pin');
  memberId = ''; pin = '';
  if (familyKey) showLogin();   // a 401 in login() already routed to the gate
})();
</script>
